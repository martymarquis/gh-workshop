name: Quarto Site Build and Deploy - Branch-based Pattern
# Sourced from https://quarto.org/docs/publishing/github-pages.html#github-action
# You MUST complete a local publish to gh-pages branch first for this workflow to work!
# See link above for GitHub Actions instructions.

on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
